
spring.profiles.active=dev
spring.application.name=dave-adapter-telraam
spring.security.oauth2.client.registration.dave.client-id=${DAVE_OAUTH_CLIENT_ID:dave-adapter}
spring.security.oauth2.client.registration.dave.client-secret=${DAVE_OAUTH_CLIENT_SECRET:}
spring.security.oauth2.client.registration.dave.authorization-grant-type=client_credentials
spring.security.oauth2.client.registration.dave.scope=openid
spring.security.oauth2.client.provider.dave.token-uri=${DAVE_OAUTH_TOKEN_URI:http://localhost:8081/realms/dave/protocol/openid-connect/token}

telraam.api-url=https://telraam-api.net/v1
telraam.api-key=${TELRAAM_API_KEY:}
telraam.bounding-box.min-lon=${TELRAAM_BBOX_MIN_LON:11.54}
telraam.bounding-box.min-lat=${TELRAAM_BBOX_MIN_LAT:48.13}
telraam.bounding-box.max-lon=${TELRAAM_BBOX_MAX_LON:11.60}
telraam.bounding-box.max-lat=${TELRAAM_BBOX_MAX_LAT:48.17}
telraam.segment-mapping[0].segment-id=9000001463
telraam.segment-mapping[0].zaehlung-id=00000000-0000-0000-0000-000000000000
telraam.segment-mapping[0].direction-a-to-b=1
telraam.segment-mapping[0].direction-b-to-a=2
telraam.scheduler.cron=0 0/15 * * * *

dave.api-url=${DAVE_API_URL:http://localhost:8080}

logging.level.de.starwit.telraam=INFO
logging.level.org.springframework.web.reactive.function.client=WARN
logging.level.org.springframework.security=WARN
